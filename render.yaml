services:
  # 1. Embeddings Server (Private Service)
  - type: pserv
    name: edusage-embeddings
    env: docker
    rootDir: edusage-embeddings
    dockerfilePath: Dockerfile
    plan: starter # Starter plan recommended for RAM requirements
    envVars:
      - key: PORT
        value: 8001

  # 2. ChromaDB (Private Service with Persistent Disk)
  - type: pserv
    name: edusage-chromadb
    env: docker
    image: chromadb/chroma:latest
    plan: starter
    disk:
      name: chromadb-data
      mountPath: /chroma/chroma
      sizeGB: 5
    envVars:
      - key: IS_PERSISTENT
        value: "TRUE"

  # 3. Backend API (Web Service)
  - type: web
    name: edusage-backend
    env: docker
    rootDir: edusage-backend
    dockerfilePath: Dockerfile
    plan: free # Can start with free, upgrade if PyMuPDF/Node needs more RAM
    envVars:
      # Use internal Render hostnames for communication
      - key: CHROMA_URL
        value: "http://edusage-chromadb:8000"
      - key: EMBEDDING_SERVICE_URL
        value: "http://edusage-embeddings:8001"
      # Sync other variables from Render Dashboard
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CUSTOM_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
    
    # Expose the API to frontend
    healthCheckPath: /

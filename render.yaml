services:
  # Single Web Service — Node.js backend
  # ChromaDB and local embedding server are no longer needed.
  # Vectors are stored in MongoDB Atlas, embeddings via OpenAI API.
  - type: web
    name: edusage-backend
    env: docker
    rootDir: edusage-backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false           # fill in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CUSTOM_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
    healthCheckPath: /
